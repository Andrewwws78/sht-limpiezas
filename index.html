<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHT — Confirmación de Servicio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;}
  body{background:#F0F4F8;min-height:100vh;padding:16px;}
  .logo{text-align:center;padding:20px 0 10px;}
  .logo h1{font-size:20px;color:#1D3557;font-weight:700;}
  .logo p{font-size:13px;color:#6C757D;margin-top:4px;}

  /* ── SEND PANEL (secretaria) ── */
  .panel{background:#fff;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
  .panel h2{font-size:15px;font-weight:700;color:#1D3557;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
  .form-group{margin-bottom:14px;}
  label{display:block;font-size:12px;font-weight:600;color:#495057;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em;}
  select,input[type=text],input[type=date],input[type=time],textarea{
    width:100%;padding:10px 12px;border:1.5px solid #DEE2E6;border-radius:8px;
    font-size:14px;color:#1D3557;background:#FAFBFC;outline:none;
    transition:border-color .2s;}
  select:focus,input:focus,textarea:focus{border-color:#1D9E75;}
  textarea{resize:vertical;min-height:70px;font-size:13px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
  .btn-wa{
    width:100%;padding:14px;border:none;border-radius:10px;
    background:#25D366;color:#fff;font-size:15px;font-weight:700;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;
    margin-top:4px;transition:background .2s;}
  .btn-wa:hover{background:#1ebe5d;}
  .btn-wa svg{width:22px;height:22px;fill:#fff;}
  .preview{background:#ECF8F1;border-radius:10px;padding:14px;margin-top:14px;
            font-size:13px;color:#155724;line-height:1.6;display:none;
            border-left:4px solid #1D9E75;white-space:pre-wrap;word-break:break-word;}

  /* ── CONFIRM PANEL (limpiadora) ── */
  .confirm-panel{background:#fff;border-radius:16px;padding:24px;margin-bottom:16px;
                 box-shadow:0 2px 8px rgba(0,0,0,.06);display:none;}
  .task-card{background:#F0F9F5;border-radius:12px;padding:16px;margin-bottom:16px;
             border-left:4px solid #1D9E75;}
  .task-card h3{font-size:16px;font-weight:700;color:#1D3557;margin-bottom:10px;}
  .task-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:14px;color:#495057;}
  .task-icon{width:20px;text-align:center;font-size:16px;}
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .btn-ok{padding:16px;border:none;border-radius:10px;background:#1D9E75;color:#fff;
          font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;}
  .btn-ok:hover{background:#17856a;}
  .btn-no{padding:16px;border:none;border-radius:10px;background:#E63946;color:#fff;
          font-size:16px;font-weight:700;cursor:pointer;transition:background .2s;}
  .btn-no:hover{background:#c1121f;}
  .response-msg{text-align:center;padding:24px;border-radius:12px;margin-top:8px;}
  .response-msg.ok{background:#D4EDDA;color:#155724;}
  .response-msg.no{background:#F8D7DA;color:#721C24;}
  .response-msg h3{font-size:18px;font-weight:700;margin-bottom:8px;}
  .response-msg p{font-size:14px;}

  /* tabs */
  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;
       cursor:pointer;transition:all .2s;}
  .tab.active{background:#1D3557;color:#fff;}
  .tab:not(.active){background:#DEE2E6;color:#495057;}

  .badge{display:inline-block;background:#E63946;color:#fff;border-radius:99px;
         font-size:11px;font-weight:700;padding:2px 8px;margin-left:6px;}

  @media(max-width:500px){
    .row2{grid-template-columns:1fr;}
    body{padding:10px;}
  }
</style>
</head>
<body>

<div class="logo">
  <h1>🏡 Superhost Tenerife</h1>
  <p>Sistema de confirmación de limpiezas</p>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('send')">📤 Enviar asignación</button>
  <button class="tab" onclick="showTab('confirm')" id="tab-confirm">✅ Ver confirmación</button>
</div>

<!-- PANEL SECRETARIA -->
<div class="panel" id="panel-send">
  <h2>📤 Asignar y notificar por WhatsApp</h2>

  <div class="form-group">
    <label>Limpiadora</label>
    <select id="sel-cleaner">
      <option value="">— Selecciona limpiadora —</option>
      <option value="Thay">Thay</option>
      <option value="Yohanna">Yohanna</option>
      <option value="Dayana">Dayana</option>
      <option value="Sonia">Sonia</option>
      <option value="Nivea">Nivea</option>
      <option value="Vanesa">Vanesa</option>
      <option value="Ari">Ari</option>
      <option value="Nangely">Nangely</option>
      <option value="Emily">Emily</option>
      <option value="Ángel">Ángel</option>
      <option value="Nuria">Nuria</option>
      <option value="Diana">Diana</option>
      <option value="Nadia">Nadia</option>
      <option value="Isa">Isa</option>
      <option value="Anahí">Anahí</option>
      <option value="Cecilia">Cecilia</option>
      <option value="Ismar">Ismar</option>
      <option value="Olga">Olga</option>
    </select>
  </div>

  <div class="form-group">
    <label>Teléfono WhatsApp (con prefijo)</label>
    <input type="text" id="inp-phone" placeholder="Ej: 34612345678" />
  </div>

  <div class="form-group">
    <label>Propiedad</label>
    <input type="text" id="inp-prop" placeholder="Ej: 02 Ático Tabaiba" />
  </div>

  <div class="row2">
    <div class="form-group">
      <label>Fecha</label>
      <input type="date" id="inp-date" />
    </div>
    <div class="form-group">
      <label>Hora entrada huésped</label>
      <input type="time" id="inp-time" />
    </div>
  </div>

  <div class="row2">
    <div class="form-group">
      <label>Tipo</label>
      <select id="sel-tipo">
        <option value="Entrada">Entrada (nuevo huésped)</option>
        <option value="Salida">Salida (huésped se va)</option>
        <option value="Mantenimiento">Mantenimiento</option>
      </select>
    </div>
    <div class="form-group">
      <label>Huéspedes</label>
      <input type="text" id="inp-pax" placeholder="Ej: 2 adultos" />
    </div>
  </div>

  <div class="form-group">
    <label>Notas especiales (opcional)</label>
    <textarea id="inp-notes" placeholder="Ej: Baby pack, llave en caja, limpieza profunda..."></textarea>
  </div>

  <div class="preview" id="msg-preview"></div>

  <button class="btn-wa" onclick="sendWhatsApp()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Enviar por WhatsApp
  </button>
</div>

<!-- PANEL CONFIRMACION (limpiadora) -->
<div class="confirm-panel" id="panel-confirm">
  <div id="confirm-content"></div>
</div>

<script>
// ── Helpers ──────────────────────────────────────────────────────────────────
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-send').style.display    = tab==='send'?'block':'none';
  document.getElementById('panel-confirm').style.display = tab==='confirm'?'block':'none';
  document.querySelectorAll('.tab')[tab==='send'?0:1].classList.add('active');
  if (tab==='confirm') loadConfirmFromURL();
}

// Set today as default date
const today = new Date().toISOString().split('T')[0];
document.getElementById('inp-date').value = today;

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  const days = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const months = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return `${days[d.getDay()]} ${d.getDate()} de ${months[d.getMonth()]}`;
}

function buildParams() {
  return {
    cleaner: document.getElementById('sel-cleaner').value,
    phone:   document.getElementById('inp-phone').value.replace(/\D/g,''),
    prop:    document.getElementById('inp-prop').value,
    date:    document.getElementById('inp-date').value,
    time:    document.getElementById('inp-time').value,
    tipo:    document.getElementById('sel-tipo').value,
    pax:     document.getElementById('inp-pax').value,
    notes:   document.getElementById('inp-notes').value,
  };
}

function buildConfirmURL(p) {
  const base = window.location.href.split('?')[0];
  const params = new URLSearchParams({
    cleaner: p.cleaner,
    prop: p.prop,
    date: p.date,
    time: p.time,
    tipo: p.tipo,
    pax: p.pax,
    notes: p.notes,
  });
  return `${base}?${params.toString()}#confirm`;
}

function sendWhatsApp() {
  const p = buildParams();
  if (!p.cleaner) { alert('Selecciona una limpiadora'); return; }
  if (!p.phone)   { alert('Introduce el teléfono'); return; }
  if (!p.prop)    { alert('Introduce la propiedad'); return; }
  if (!p.date)    { alert('Selecciona la fecha'); return; }

  const confirmURL = buildConfirmURL(p);
  const dateFormatted = formatDate(p.date);
  const timeStr = p.time ? `a las ${p.time}h` : '';
  const tipoStr = p.tipo === 'Entrada' ? '🟢 ENTRADA de nuevo huésped' : p.tipo === 'Salida' ? '🔵 SALIDA de huésped' : '🔧 MANTENIMIENTO';
  const notesStr = p.notes ? `\n📝 *Notas:* ${p.notes}` : '';
  const paxStr = p.pax ? `\n👥 *Huéspedes:* ${p.pax}` : '';

  const msg = `Hola ${p.cleaner} 👋\n\nTe asignamos una limpieza:\n\n🏠 *Propiedad:* ${p.prop}\n📅 *Fecha:* ${dateFormatted}\n⏰ *Hora:* ${timeStr}\n${tipoStr}${paxStr}${notesStr}\n\n✅ Por favor confirma o rechaza usando este enlace:\n${confirmURL}\n\n¡Gracias! — Superhost Tenerife`;

  // Show preview
  const prev = document.getElementById('msg-preview');
  prev.textContent = msg;
  prev.style.display = 'block';

  // Open WhatsApp
  const waURL = `https://wa.me/${p.phone}?text=${encodeURIComponent(msg)}`;
  setTimeout(() => window.open(waURL, '_blank'), 300);
}

// ── Confirmation view (limpiadora) ────────────────────────────────────────────
function loadConfirmFromURL() {
  const params = new URLSearchParams(window.location.search);
  const cleaner = params.get('cleaner');
  const prop    = params.get('prop');
  const date    = params.get('date');
  const time    = params.get('time');
  const tipo    = params.get('tipo');
  const pax     = params.get('pax');
  const notes   = params.get('notes');
  const content = document.getElementById('confirm-content');

  // Check if already responded
  const storageKey = `sht_resp_${prop}_${date}`;
  const saved = localStorage.getItem(storageKey);

  if (!cleaner && !prop) {
    content.innerHTML = `<div style="text-align:center;padding:30px;color:#6C757D;">
      <div style="font-size:40px;margin-bottom:12px;">📋</div>
      <p style="font-size:15px;">Esta pantalla es para que las limpiadoras confirmen su servicio.<br><br>
      Cuando tu secretaria te envíe el enlace por WhatsApp, aparecerá aquí la información de tu limpieza.</p></div>`;
    return;
  }

  const dateFormatted = formatDate(date);
  const tipoColor = tipo === 'Entrada' ? '#1D9E75' : tipo === 'Salida' ? '#185FA5' : '#6C757D';
  const tipoIcon  = tipo === 'Entrada' ? '🟢' : tipo === 'Salida' ? '🔵' : '🔧';

  if (saved) {
    const resp = JSON.parse(saved);
    content.innerHTML = `
      <div style="text-align:center;padding:12px 0 20px;">
        <div style="font-size:36px;margin-bottom:8px;">${resp.ok ? '✅' : '❌'}</div>
        <h3 style="font-size:18px;font-weight:700;color:${resp.ok?'#155724':'#721C24'};">
          ${resp.ok ? 'Servicio confirmado' : 'Servicio rechazado'}
        </h3>
        <p style="font-size:13px;color:#6C757D;margin-top:6px;">Respondiste el ${resp.time}</p>
      </div>
      <div class="task-card" style="border-color:${tipoColor}">
        <h3>${prop}</h3>
        <div class="task-row"><span class="task-icon">📅</span> ${dateFormatted}</div>
        ${time ? `<div class="task-row"><span class="task-icon">⏰</span> Hora entrada huésped: ${time}h</div>` : ''}
        <div class="task-row"><span class="task-icon">${tipoIcon}</span> ${tipo}</div>
        ${pax ? `<div class="task-row"><span class="task-icon">👥</span> ${pax}</div>` : ''}
        ${notes ? `<div class="task-row"><span class="task-icon">📝</span> ${notes}</div>` : ''}
      </div>
      <button onclick="resetResponse('${storageKey}')" style="width:100%;padding:12px;border:1.5px solid #DEE2E6;border-radius:8px;background:#fff;color:#6C757D;font-size:13px;cursor:pointer;">Cambiar respuesta</button>`;
    return;
  }

  content.innerHTML = `
    <div style="text-align:center;margin-bottom:16px;">
      <div style="font-size:14px;color:#6C757D;">Hola, <strong>${cleaner}</strong> 👋</div>
      <h2 style="font-size:17px;font-weight:700;color:#1D3557;margin-top:4px;">Confirmación de servicio</h2>
    </div>
    <div class="task-card" style="border-color:${tipoColor}">
      <h3>${prop}</h3>
      <div class="task-row"><span class="task-icon">📅</span> ${dateFormatted}</div>
      ${time ? `<div class="task-row"><span class="task-icon">⏰</span> Hora entrada huésped: <strong>${time}h</strong></div>` : ''}
      <div class="task-row"><span class="task-icon">${tipoIcon}</span> <strong>${tipo}</strong></div>
      ${pax ? `<div class="task-row"><span class="task-icon">👥</span> ${pax}</div>` : ''}
      ${notes ? `<div class="task-row"><span class="task-icon">📝</span> ${notes}</div>` : ''}
    </div>
    <p style="font-size:13px;color:#6C757D;text-align:center;margin-bottom:12px;">¿Puedes realizar este servicio?</p>
    <div class="btn-row">
      <button class="btn-ok" onclick="respond(true,'${storageKey}')">✅ Sí, confirmo</button>
      <button class="btn-no" onclick="respond(false,'${storageKey}')">❌ No puedo</button>
    </div>`;
}

function respond(ok, key) {
  const now = new Date().toLocaleString('es-ES');
  localStorage.setItem(key, JSON.stringify({ok, time: now}));
  const content = document.getElementById('confirm-content');
  content.innerHTML = `
    <div class="response-msg ${ok?'ok':'no'}">
      <h3>${ok ? '✅ ¡Confirmado!' : '❌ Rechazado'}</h3>
      <p>${ok ? 'Gracias. Tu supervisora ha sido notificada.' : 'Entendido. Tu supervisora buscará otra limpiadora.'}</p>
    </div>`;
  // Auto-notify via WhatsApp back
  const params = new URLSearchParams(window.location.search);
  const cleaner = params.get('cleaner');
  const prop = params.get('prop');
  const date = params.get('date');
  const dateFormatted = formatDate(date);
  const msgBack = ok
    ? `✅ Hola! ${cleaner} ha *confirmado* la limpieza de *${prop}* el ${dateFormatted}.`
    : `❌ Hola! ${cleaner} ha *rechazado* la limpieza de *${prop}* el ${dateFormatted}. Necesitas asignar otra limpiadora.`;
  // Open WhatsApp to notify back (to the office number)
  const officePhone = '34683507588'; // placeholder — replace with real number
  setTimeout(() => {
    window.open(`https://wa.me/${officePhone}?text=${encodeURIComponent(msgBack)}`, '_blank');
  }, 800);
}

function resetResponse(key) {
  localStorage.removeItem(key);
  loadConfirmFromURL();
}

// Auto-open confirm tab if URL has params
if (window.location.search || window.location.hash === '#confirm') {
  showTab('confirm');
}
</script>
</body>
</html>
